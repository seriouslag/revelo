name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      # Use `npm install`, not `npm ci`: rolldown's per-platform optional native
      # deps (@emnapi/*) drift between the dev lockfile and the Linux runner,
      # which `npm ci` rejects. `npm install` honors the lockfile but tolerates
      # platform-specific optional-dep resolution.
      - run: npm install --no-audit --no-fund

      - name: Type-check
        run: npm run check-types

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: node rolldown.config.mjs --production

      - name: Package (verify vsix builds)
        run: npx --yes @vscode/vsce package --no-dependencies -o revelo.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: revelo-vsix
          path: revelo.vsix
          if-no-files-found: error
