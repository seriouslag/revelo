name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Type-check
        run: npm run check-types

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: node rolldown.config.mjs --production

      - name: Package (verify vsix builds)
        run: npx --yes @vscode/vsce package --no-dependencies -o revelo.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: revelo-vsix
          path: revelo.vsix
          if-no-files-found: error
