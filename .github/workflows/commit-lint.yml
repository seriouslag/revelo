name: Commit lint

# Enforce Conventional Commits on PR titles. With squash-merge, the PR title
# becomes the commit message on main, so this keeps history parseable
# (feat:/fix:/chore: …) and drives readable release notes.
on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: read

jobs:
  lint-title:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
