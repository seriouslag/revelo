name: Publish (stable)

# Stable releases are cut by pushing a version tag, e.g. `git tag v0.2.0`.
# Per VS Code convention stable uses an EVEN minor version; the tag must match
# package.json's version. Also dispatchable manually for re-runs.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dryRun:
        description: "Package only, do not publish"
        type: boolean
        default: false

# Needed for the "Create GitHub release" step to push a release + upload assets.
permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      # See ci.yml: npm install (not ci) to tolerate rolldown's per-platform
      # optional native deps.
      - run: npm install --no-audit --no-fund

      # Full gate before anything is published.
      - run: npm run check-types
      - run: npm run lint
      - run: npm test

      - name: Validate version and tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          if [ $((MINOR % 2)) -ne 0 ]; then
            echo "::error::Stable version $VERSION must use an even minor (VS Code convention)."
            exit 1
          fi
          # On a tag push, ensure the tag matches package.json.
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
            if [ "$TAG" != "v$VERSION" ]; then
              echo "::error::Tag $TAG does not match package.json version v$VERSION."
              exit 1
            fi
          fi
          echo "Stable version: $VERSION"

      - name: Package
        run: npx --yes @vscode/vsce package --no-dependencies -o revelo.vsix

      - name: Publish to VS Code Marketplace
        if: ${{ !inputs.dryRun }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx --yes @vscode/vsce publish --no-dependencies --packagePath revelo.vsix

      - name: Publish to Open VSX (Cursor)
        if: ${{ !inputs.dryRun }}
        run: npx --yes ovsx publish revelo.vsix -p ${{ secrets.OVSX_PAT }}

      - name: Create GitHub release
        if: ${{ github.ref_type == 'tag' && !inputs.dryRun }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" revelo.vsix --title "${{ github.ref_name }}" --generate-notes

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: revelo-vsix
          path: revelo.vsix
          if-no-files-found: error
